<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fardanil Travel Services</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- SweetAlert2 CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="preloader">
        <div class="spinner-logo text-center">
            <i class="fa-solid fa-plane-departure fa-3x text-teal mb-3 animate-bounce"></i>
            <h5 class="fw-bold text-secondary">Loading Fardanil Travel...</h5>
        </div>
    </div>

    <nav class="navbar navbar-expand-xl fixed-top shadow-sm">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
                <img src="assets/logo fl.jpg" alt="Logo FL" class="nav-logo">
                <div class="brand-text-wrapper">
                    <span class="brand-title fw-bold d-block">Fardanil</span>
                    <span class="brand-subtitle text-secondary d-block">Travel Services</span>
                </div>
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center gap-2">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About Us</a></li>
                    <li class="nav-item"><a class="nav-link" href="destination-list.html">Destinations</a></li>
                    <li class="nav-item"><a class="nav-link" href="destination-highlights.html">Destination Highlights</a></li>
                    <li class="nav-item"><a class="nav-link" href="special-offers.html">Special Offers</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact Us</a></li>
                    <li class="nav-item"><a class="nav-link text-danger-custom fw-bold active" href="signin.html">Sign In</a></li>
                    <li class="nav-item ms-xl-2">
                        <a class="btn btn-book-tour text-white fw-bold px-4 rounded-3 shadow-sm text-uppercase" href="book-tour.html">Book A Tour</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="py-5 min-vh-100 d-flex align-items-center bg-light mt-4">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-5">
                    <div class="card border-0 shadow-sm rounded-3 overflow-hidden">
                        <div class="bg-teal text-white text-center py-4">
                            <h4 class="fw-bold m-0"><i class="fa-solid fa-lock me-2"></i>Sign In Account</h4>
                        </div>
                        <div class="card-body p-4 bg-white text-start">
                            <form id="signinForm" novalidate>
                                <div class="mb-3">
                                    <label class="form-label small fw-bold text-secondary">Email Address</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-white border-end-0 text-secondary"><i class="fa-solid fa-envelope"></i></span>
                                        <input type="email" id="inputEmail" class="form-control py-2 border-start-0 bg-light" placeholder="name@email.com" required>
                                    </div>
                                </div>
                                <div class="mb-4">
                                    <label class="form-label small fw-bold text-secondary">Password</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-white border-end-0 text-secondary"><i class="fa-solid fa-key"></i></span>
                                        <input type="password" id="inputPassword" class="form-control py-2 border-start-0 bg-light" placeholder="••••••••" required minlength="6">
                                    </div>
                                </div>
                                <button type="submit" class="btn btn-teal w-100 fw-bold text-white rounded-2 shadow-sm text-uppercase">Login Now</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="bg-teal text-white py-4 text-center small">
        <div class="container">&copy; 2026 Fardanil Travel Services. All Rights Reserved.</div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- SweetAlert2 JS -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
    <script src="javascrip.js"></script>
</body>
</html>
